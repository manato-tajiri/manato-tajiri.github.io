    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({startOnLoad:true, theme:'default'});
    await mermaid.run({querySelector:'code.language-mermaid'});
</script>

<!-- JP/EN language toggle -->
<script>
(function () {
  var KEY = 'site-lang';
  var SUPPORTED = ['ja', 'en'];
  function detect() {
    try {
      var s = localStorage.getItem(KEY);
      if (s && SUPPORTED.indexOf(s) >= 0) return s;
    } catch (e) {}
    var nav = (navigator.language || 'en').toLowerCase();
    return nav.indexOf('ja') === 0 ? 'ja' : 'en';
  }
  function apply(lang) {
    if (SUPPORTED.indexOf(lang) < 0) return;
    document.body.setAttribute('data-lang', lang);
    document.documentElement.setAttribute('lang', lang);
    var opts = document.querySelectorAll('#lang-toggle .lang-opt');
    for (var i = 0; i < opts.length; i++) {
      opts[i].classList.toggle('is-active', opts[i].getAttribute('data-lang') === lang);
    }
    try { localStorage.setItem(KEY, lang); } catch (e) {}
  }
  document.addEventListener('DOMContentLoaded', function () {
    apply(detect());
    var root = document.getElementById('lang-toggle');
    if (!root) return;
    root.addEventListener('click', function (e) {
      var t = e.target.closest('.lang-opt');
      if (!t) {
        var cur = document.body.getAttribute('data-lang') || 'ja';
        apply(cur === 'ja' ? 'en' : 'ja');
      } else {
        apply(t.getAttribute('data-lang'));
      }
    });
  });
})();
</script>
